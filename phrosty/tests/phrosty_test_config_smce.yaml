replaceable_preloads:
  - /snpit_test_config.yaml

system:
  paths:
    scratch_dir: /scratch/phrosty_temp
    temp_dir: /scratch/phrosty_temp
    dia_out_dir: /scratch/dia_out_dir/
    ltcv_dir: /scratch/lc_out_dir/
    snappl:
      A25ePSF_path: /a25epsf

photometry:
  snappl:
      temp_dir: /scratch

  phrosty:
    image_type: ou2024fits
    force_sky_subtract: false
    keep_intermediate: true
    remove_temp_dir: false
    mem_trace: false
    kerpolyorder: 2

    sfft:
      radius_cut_detmask: 2

    psf:
      type: A25ePSF
      params: {}